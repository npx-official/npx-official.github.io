<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevHub • HTB Writeup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0d15;
            color: #e0e5f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(12, 16, 28, 0.9);
            border: 1px solid rgba(0, 255, 200, 0.15);
            border-radius: 2rem;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
        }
        h1 {
            font-size: 2.5rem;
            color: #6fffe0;
            margin-bottom: 1rem;
        }
        .status {
            font-size: 1.2rem;
            color: #b6c8e0;
            margin: 2rem 0;
            padding: 1.5rem;
            background: rgba(255, 200, 0, 0.05);
            border: 1px solid rgba(255, 200, 0, 0.2);
            border-radius: 1rem;
        }
        .status i {
            color: #ffcc00;
            margin-right: 0.5rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            border: 1px solid rgba(0, 255, 200, 0.2);
            border-radius: 1rem;
            color: #b6c8e0;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            border-color: #6fffe0;
            color: #ffffff;
            transform: translateX(-5px);
        }
        .footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(0, 255, 200, 0.05);
            color: #b6c8e0;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 HTB DevHub</h1>
        <div class="status">
            <i>⚠️</i> Writeup not available yet. Coming soon...
        </div>
        <a href="../../writeups.html" class="back-link">← Back to Writeups</a>
        <div class="footer">NIGHT PULSE X • 2026</div>
    </div>
</body>
</html>
